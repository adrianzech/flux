apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actualbudget
  namespace: finance
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts-finance
        namespace: finance
  values:
    controllers:
      actualbudget:
        containers:
          app:
            image:
              repository: actualbudget/actual-server
              tag: "26.7.0"
            env:
              - name: ACTUAL_PORT
                value: "5006"
    service:
      app:
        controller: actualbudget
        ports:
          http:
            port: 5006
    persistence:
      data:
        enabled: true
        existingClaim: actualbudget-data-pvc
        globalMounts:
          - path: /data
