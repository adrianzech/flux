apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: euro-office-secrets
  namespace: nextcloud
spec:
  hostAPI: https://infisical.zech.co/api
  syncConfig:
    resyncInterval: 1h
  authentication:
    kubernetesAuth:
      identityId: "${INFISICAL_IDENTITY_ID}"
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-service-account
        namespace: infisical
      secretsScope:
        projectId: "${INFISICAL_PROJECT_ID}"
        envSlug: "${INFISICAL_ENV_SLUG}"
        secretsPath: "/Nextcloud"
  managedKubeSecretReferences:
    - secretName: euro-office-secrets
      secretNamespace: nextcloud
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          jwt-secret: "{{ .EURO_OFFICE_JWT_SECRET.Value }}"
