apiVersion: v1
kind: Service
metadata:
  name: pulse-external
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 7655
      protocol: TCP
      targetPort: 7655
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: pulse-external
  namespace: monitoring
  labels:
    kubernetes.io/service-name: pulse-external
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 7655
endpoints:
  - addresses:
      - 10.0.10.100
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulse-ingress
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulse.${DOMAIN}`)
      kind: Rule
      services:
        - name: pulse-external
          port: 7655
