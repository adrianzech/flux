apiVersion: v1
kind: Service
metadata:
  name: pulse-external
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 7655
      protocol: TCP
      targetPort: 7655
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pulse-external
  namespace: monitoring
subsets:
  - addresses:
      - ip: 10.0.10.100
    ports:
      - name: http
        port: 7655
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulse-ingress
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulse.${DOMAIN}`)
      kind: Rule
      services:
        - name: pulse-external
          port: 7655
