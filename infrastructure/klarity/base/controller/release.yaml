apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: klarity
  namespace: monitoring
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: klarity
      version: "1.0.1"
      sourceRef:
        kind: HelmRepository
        name: klarity
        namespace: monitoring
      interval: 5m
  valuesFrom:
    - kind: Secret
      name: klarity-secrets
      valuesKey: OIDC_CLIENT_ID
      targetPath: config.oidc.clientID
      optional: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: klarity
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: klarity
              spec:
                template:
                  spec:
                    hostAliases:
                      - ip: "${TRAEFIK_LB_IP}"
                        hostnames:
                          - "sso.${DOMAIN}"
  values:
    replicaCount: 1
    config:
      authMode: internal
      logLevel: info
      logFormat: json
      oidc:
        issuerURL: "https://sso.${DOMAIN}/application/o/klarity/"
        redirectURL: "https://klarity.${DOMAIN}/callback"
        scopes: "openid,profile,email"
    oidcClientSecretRef:
      name: klarity-secrets
      key: OIDC_CLIENT_SECRET
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 1Gi
