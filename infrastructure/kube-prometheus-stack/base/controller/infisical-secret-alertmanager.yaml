apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: kube-prometheus-stack-alertmanager-config
  namespace: monitoring
spec:
  hostAPI: https://infisical.zech.co/api
  syncConfig:
    resyncInterval: 1h
  authentication:
    kubernetesAuth:
      identityId: "${INFISICAL_IDENTITY_ID}"
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-service-account
        namespace: infisical
      secretsScope:
        projectId: "${INFISICAL_PROJECT_ID}"
        envSlug: "${INFISICAL_ENV_SLUG}"
        secretsPath: "/Monitoring/Alertmanager"
  managedKubeSecretReferences:
    - secretName: kube-prometheus-stack-alertmanager-config
      secretNamespace: monitoring
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          alertmanager.yaml: |
            global:
              resolve_timeout: 5m
              smtp_smarthost: "{{ .SMARTHOST.Value }}"
              smtp_from: "{{ .SMTP_FROM.Value }}"
              smtp_auth_username: "{{ .SMTP_USERNAME.Value }}"
              smtp_auth_password: "{{ .SMTP_PASSWORD.Value }}"
              smtp_require_tls: true
            inhibit_rules:
              - source_matchers:
                  - 'severity = critical'
                target_matchers:
                  - 'severity =~ warning|info'
                equal:
                  - namespace
                  - alertname
              - source_matchers:
                  - 'severity = warning'
                target_matchers:
                  - 'severity = info'
                equal:
                  - namespace
                  - alertname
              - source_matchers:
                  - 'alertname = InfoInhibitor'
                target_matchers:
                  - 'severity = info'
                equal:
                  - namespace
            route:
              group_by:
                - namespace
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: email
              routes:
                - receiver: "null"
                  matchers:
                    - alertname = "Watchdog"
            receivers:
              - name: "null"
              - name: email
                email_configs:
                  - to: "{{ .EMAIL_TO.Value }}"
                    send_resolved: true
            templates:
              - /etc/alertmanager/config/*.tmpl
