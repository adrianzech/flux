apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 15m
  timeout: 20m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.1.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 5m
  install:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
  values:
    fullnameOverride: kube-prometheus-stack
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false

    grafana:
      admin:
        existingSecret: kube-prometheus-stack-grafana-secrets
        userKey: admin-user
        passwordKey: admin-password
      envFromSecret: kube-prometheus-stack-grafana-secrets
      grafana.ini:
        server:
          root_url: https://grafana.${DOMAIN}
        auth:
          oauth_auto_login: true
          signout_redirect_url: https://sso.${DOMAIN}/application/o/kube-prometheus-stack-grafana/end-session/
        auth.generic_oauth:
          enabled: true
          name: Authentik
          client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid profile email
          auth_url: https://sso.${DOMAIN}/application/o/authorize/
          token_url: https://sso.${DOMAIN}/application/o/token/
          api_url: https://sso.${DOMAIN}/application/o/userinfo/
          role_attribute_path: "contains(groups[*], 'authentik Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
      hostAliases:
        - ip: "${TRAEFIK_LB_IP}"
          hostnames:
            - sso.${DOMAIN}
      persistence:
        enabled: true
        storageClassName: proxmox-csi
        accessModes:
          - ReadWriteOnce
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi

    alertmanager:
      alertmanagerSpec:
        configSecret: kube-prometheus-stack-alertmanager-config
        externalUrl: https://alerts.${DOMAIN}
        routePrefix: /
        retention: 120h
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: proxmox-csi
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

    prometheus:
      prometheusSpec:
        retention: 30d
        externalUrl: https://prometheus.local.${DOMAIN}
        routePrefix: /
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: proxmox-csi
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi

    prometheusOperator:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    kube-state-metrics:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
